steps:
  # Build and deploy API to Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/lesson-scheduler-api', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lesson-scheduler-api']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lesson-scheduler-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/lesson-scheduler-api'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # Build and deploy web app to Cloud Storage
  - name: 'node:lts-alpine3.10'
    entrypoint: npm
    args: ['run', 'build', 'web']

  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'cp', '-r', 'dist/apps/web/*', 'gs://$PROJECT_ID-web/']

  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'setmeta', '-h', 'Cache-Control:public, max-age=0, must-revalidate', 'gs://$PROJECT_ID-web/**/*.html']

  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      [
        '-m',
        'setmeta',
        '-h',
        'Cache-Control:public, max-age=31536000',
        'gs://$PROJECT_ID-web/**/*.{js,css,png,jpg,jpeg,gif,ico,svg,woff,woff2,ttf,eot}',
      ]
